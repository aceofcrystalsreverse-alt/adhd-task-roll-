<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ADHD TASK ROLL</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #161616; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState } = React;

const templates = {
  nothing: {
    label: "なんもしたくない日", emoji: "🌫️", color: "#7B9EA8",
    must: ["トイレに行く", "顔を洗う", "窓を開ける"],
    free: ["コーヒーを飲む", "目薬をさす", "スマホを5分置く"],
    footer: "今日もえらい。",
  },
  alittle: {
    label: "ちょっとがんばる日", emoji: "🌱", color: "#7BAF7B",
    must: ["トイレに行く", "顔を洗う", "窓を開ける", "洗濯を回す"],
    free: ["コーヒーを飲む", "目薬をさす", "洗濯物を干す", "掃除機をかける", "ダンベルを持つ"],
    footer: "1つできたら今日は勝ち。",
  },
  study: {
    label: "資格勉強メイン日", emoji: "📘", color: "#8A7BAF",
    must: ["トイレに行く", "顔を洗う", "テキストを1ページ開く", "過去問を1問解く"],
    free: ["コーヒーを飲む", "目薬をさす", "テキストを5分読む", "答え合わせをする"],
    footer: "1問解いたら今日は合格。",
  },
  hobby: {
    label: "趣味全開日", emoji: "🎮", color: "#AF8A7B",
    must: ["トイレに行く", "顔を洗う", "窓を開ける", "趣味を1つ選ぶ：___________"],
    free: ["コーヒーを飲む", "目薬をさす", "趣味その2：___________", "趣味その3：___________"],
    footer: "全部やらなくていい。1つでも勝ち。",
  },
  outing: {
    label: "外出する日", emoji: "🚪", color: "#AF9E7B",
    must: ["顔を洗う", "持ち物確認する", "戸締り確認する", "目的地：___________"],
    free: ["目薬をさす", "窓を開ける", "荷物を置く（帰宅後）", "手を洗う（帰宅後）", "コーヒーを飲む（帰宅後）"],
    footer: "帰ってきた。それだけで今日は勝ち。",
  },
};

// RawBT専用の暗号（文字サイズ変更など）
function buildIntentString(label, must, free, footer) {
  const lines = [];
  const total = must.length + free.length;

  lines.push(`<113>【${label}】`);
  lines.push(`<100>================================`);
  lines.push(`<100> `);

  let mi = 0, fi = 0, idx = 1;
  while (mi < must.length || fi < free.length) {
    if (mi < must.length) {
      lines.push(`<110>▶ [${idx}/${total}] ${must[mi]}`);
      mi++; idx++;
    }
    if (fi < free.length) {
      lines.push(`<100>    ・${free[fi]}`);
      fi++; idx++;
    }
  }

  lines.push(`<100> `);
  lines.push(`<100>--------------------------------`);
  lines.push(`<113>${footer}`);
  lines.push(`<100> `);
  lines.push(`<100>バン！でもOK。床置きでもOK。`);

  return lines.join("\n");
}

function buildPlainPreview(label, must, free, footer) {
  const lines = [`【${label}】`, "================================", ""];
  const total = must.length + free.length;
  let mi = 0, fi = 0, idx = 1;
  while (mi < must.length || fi < free.length) {
    if (mi < must.length) { lines.push(`▶ [${idx}/${total}] ${must[mi]}`); mi++; idx++; }
    if (fi < free.length) { lines.push(`    ・${free[fi]}`); fi++; idx++; }
  }
  lines.push("", "--------------------------------", footer, "", "バン！でもOK。床置きでもOK。");
  return lines.join("\n");
}

// ★RawBTを直接呼び出す魔法の命令
function sendViaIntent(printData) {
  const encoded = encodeURIComponent(printData);
  const intentUrl =
    `intent:#Intent;` +
    `action=android.intent.action.SEND;` +
    `type=text/plain;` +
    `package=ru.a402d.rawbtprinter;` +
    `S.android.intent.extra.TEXT=${encoded};` +
    `end`;
  window.location.href = intentUrl;
}

function App() {
  const [selected, setSelected] = useState(null);
  const [status, setStatus] = useState("idle");

  const tmpl = selected ? templates[selected] : null;
  const preview = tmpl ? buildPlainPreview(tmpl.label, tmpl.must, tmpl.free, tmpl.footer) : "";

  function handlePrint() {
    if (!tmpl) return;
    try {
      const data = buildIntentString(tmpl.label, tmpl.must, tmpl.free, tmpl.footer);
      sendViaIntent(data);
      setStatus("sent");
      setTimeout(() => setStatus("idle"), 3000);
    } catch (e) {
      setStatus("error");
    }
  }

  const btnLabel = {
    idle:  "🖨️ 印刷する",
    sent:  "✓ 送信完了",
    error: "❌ エラー",
  }[status];

  const btnColor = {
    idle:  tmpl?.color ?? "#666",
    sent:  "#2A5A2A",
    error: "#7A2A2A",
  }[status];

  return (
    <div style={{
      minHeight: "100vh",
      background: "#161616",
      fontFamily: "'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif",
      display: "flex", flexDirection: "column", alignItems: "center",
      padding: "36px 16px 56px", gap: "22px",
    }}>

      <div style={{ textAlign: "center" }}>
        <div style={{ fontSize: 10, color: "#3A3A3A", letterSpacing: 6, marginBottom: 8 }}>ADHD TASK ROLL</div>
        <div style={{ fontSize: 24, color: "#E0D8CC", fontWeight: 700, letterSpacing: 0.5 }}>今日はどの日？</div>
      </div>

      <div style={{ display: "flex", flexDirection: "column", gap: 10, width: "100%", maxWidth: 360 }}>
        {Object.entries(templates).map(([key, t]) => (
          <button key={key} onClick={() => { setSelected(key); setStatus("idle"); }} style={{
            background: selected === key ? t.color + "22" : "#1E1E1E",
            border: `2px solid ${selected === key ? t.color : "#2A2A2A"}`,
            borderRadius: 14, padding: "14px 18px",
            display: "flex", alignItems: "center", gap: 14,
            cursor: "pointer", transition: "all 0.15s", textAlign: "left",
          }}>
            <span style={{ fontSize: 26 }}>{t.emoji}</span>
            <div style={{ flex: 1 }}>
              <div style={{ fontSize: 15, fontWeight: 700, color: selected === key ? t.color : "#999" }}>{t.label}</div>
              <div style={{ fontSize: 10, color: "#444", marginTop: 3 }}>
                ▶×{t.must.length}　・×{t.free.length}　計{t.must.length + t.free.length}項目
              </div>
            </div>
            {selected === key && <span style={{ fontSize: 18, color: t.color }}>✓</span>}
          </button>
        ))}
      </div>

      {tmpl && (
        <div style={{
          width: "100%", maxWidth: 360,
          background: "#111", border: "1px solid #252525",
          borderRadius: 14, padding: "18px",
          display: "flex", flexDirection: "column", gap: 14,
        }}>
          <pre style={{
            fontFamily: "'Courier New',monospace", fontSize: 12,
            color: "#A8A098", lineHeight: 2, whiteSpace: "pre-wrap", margin: 0,
            background: "#0C0C0C", padding: "14px", borderRadius: 8,
          }}>{preview}</pre>

          <button onClick={handlePrint} style={{
            background: btnColor,
            border: "none", borderRadius: 10, padding: "15px",
            color: "#fff", fontSize: 14, fontWeight: 700,
            cursor: "pointer", letterSpacing: 1, transition: "background 0.25s",
          }}>
            {btnLabel}
          </button>
        </div>
      )}

      <div style={{ fontSize: 11, color: "#252525", textAlign: "center" }}>
        できた日も、できなかった日も、瓶の中身は同じ1日。
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
